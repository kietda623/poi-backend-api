<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Map</title>
    <!-- Leaflet default stylesheet & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Leaflet Heatmap Plugin -->
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #f8f9fa; }
        #map { width: 100vw; height: 100vh; }

        /* Floating "My Location" button */
        #btn-my-location {
            position: fixed;
            bottom: 100px;
            right: 16px;
            z-index: 1000;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.25);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            transition: transform 0.15s ease;
        }
        #btn-my-location:active {
            transform: scale(0.9);
        }

        /* Pulsing user location dot */
        .user-pulse {
            width: 18px; height: 18px;
            background: #4285F4;
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 0 0 rgba(66,133,244,0.5);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(66,133,244,0.5); }
            70% { box-shadow: 0 0 0 16px rgba(66,133,244,0); }
            100% { box-shadow: 0 0 0 0 rgba(66,133,244,0); }
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <button id="btn-my-location" onclick="centerOnUser()" title="My Location">📍</button>
    <script>
        var map = L.map('map').setView([10.7744, 106.7015], 13);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO',
            maxZoom: 20
        }).addTo(map);

        var markers = [];
        var heatLayer = null;
        var userMarker = null;
        var userLat = null;
        var userLng = null;

        var poiIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-orange.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        // Custom pulsing dot icon for user location
        var userDivIcon = L.divIcon({
            className: '',
            html: '<div class="user-pulse"></div>',
            iconSize: [24, 24],
            iconAnchor: [12, 12]
        });

        function updatePOIs(jsonString) {
            markers.forEach(function(m) { map.removeLayer(m); });
            markers = [];

            if (heatLayer) {
                map.removeLayer(heatLayer);
            }

            var data = JSON.parse(jsonString);
            var bounds = [];
            var heatPoints = [];

            data.forEach(function(poi) {
                if(poi.Lat && poi.Lng) {
                    var popupHtml = '<div style="font-family:\'Poppins\',sans-serif; min-width:160px; padding:4px;">' +
                                    '<b style="font-size:15px; color:#333; display:block; margin-bottom:4px;">' + poi.Name + '</b>' +
                                    '<div style="color:#666; font-size:12px; margin-bottom:12px;">📍 ' + poi.Address + '</div>' +
                                    '<button onclick="window.location.href=\'play-poi:' + poi.Id + '\'" ' +
                                    'style="width:100%; padding:10px 0; background:linear-gradient(135deg, #FF6B00 0%, #E65100 100%); color:white; border:none; border-radius:12px; font-weight:bold; cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:center; gap:8px; box-shadow:0 4px 12px rgba(255,107,0,0.3);">' +
                                    '<span>🎧</span> Nghe thuyết minh' +
                                    '</button>' +
                                    '</div>';

                    var m = L.marker([poi.Lat, poi.Lng], {icon: poiIcon})
                        .addTo(map)
                        .bindPopup(popupHtml);
                    
                    markers.push(m);
                    bounds.push([poi.Lat, poi.Lng]);
                    heatPoints.push([poi.Lat, poi.Lng, 1.0]); 
                }
            });

            if (heatPoints.length > 0) {
                heatLayer = L.heatLayer(heatPoints, {
                    radius: 35,
                    blur: 20,
                    maxZoom: 16,
                    max: 1.0, 
                    gradient: {
                        0.4: 'yellow',
                        0.65: 'orange',
                        1.0: 'red'
                    }
                }).addTo(map);
            }

            if(bounds.length > 0) {
                map.fitBounds(bounds, { padding: [30, 30] });
            }
        }

        function updateUserLocation(lat, lng) {
            userLat = lat;
            userLng = lng;
            if(userMarker) {
                map.removeLayer(userMarker);
            }
            userMarker = L.marker([lat, lng], {icon: userDivIcon, zIndexOffset: 1000})
                .addTo(map)
                .bindPopup('<b style="font-family:sans-serif;">Your location</b>');
        }

        // Center map on user's current location with smooth animation
        function centerOnUser() {
            if (userLat !== null && userLng !== null) {
                map.flyTo([userLat, userLng], 16, { duration: 0.8 });
                if (userMarker) {
                    userMarker.openPopup();
                }
            }
        }
    </script>
</body>
</html>
