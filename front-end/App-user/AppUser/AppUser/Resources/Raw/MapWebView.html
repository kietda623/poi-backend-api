<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Map</title>
    <!-- Leaflet default stylesheet & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Leaflet Heatmap Plugin -->
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #f8f9fa; }
        #map { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        var map = L.map('map').setView([10.7744, 106.7015], 13);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO',
            maxZoom: 20
        }).addTo(map);

        var markers = [];
        var heatLayer = null; // Biến lưu trữ lớp Heatmap
        var userMarker = null;

        var userIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        var poiIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-orange.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        // Hàm này sẽ dùng WebView.Eval() để gọi từ C#
        function updatePOIs(jsonString) {
            // Xoá markers cũ
            markers.forEach(function(m) { map.removeLayer(m); });
            markers = [];

            // Xoá heatlayer cũ nếu có
            if (heatLayer) {
                map.removeLayer(heatLayer);
            }

            var data = JSON.parse(jsonString);
            var bounds = [];
            var heatPoints = []; // Mảng chứa vị trí cường độ cho Heatmap

            data.forEach(function(poi) {
                if(poi.Lat && poi.Lng) {
                    var popupHtml = '<div style="font-family:\'Poppins\',sans-serif; min-width:160px; padding:4px;">' +
                                    '<b style="font-size:15px; color:#333; display:block; margin-bottom:4px;">' + poi.Name + '</b>' +
                                    '<div style="color:#666; font-size:12px; margin-bottom:12px;">📍 ' + poi.Address + '</div>' +
                                    '<button onclick="window.location.href=\'play-poi:' + poi.Id + '\'" ' +
                                    'style="width:100%; padding:10px 0; background:linear-gradient(135deg, #FF6B00 0%, #E65100 100%); color:white; border:none; border-radius:12px; font-weight:bold; cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:center; gap:8px; box-shadow:0 4px 12px rgba(255,107,0,0.3);">' +
                                    '<span>🎧</span> Nghe thuyết minh' +
                                    '</button>' +
                                    '</div>';

                    // Thêm Marker thông thường
                    var m = L.marker([poi.Lat, poi.Lng], {icon: poiIcon})
                        .addTo(map)
                        .bindPopup(popupHtml);
                    
                    markers.push(m);
                    bounds.push([poi.Lat, poi.Lng]);
                    
                    // Thêm 1 vị trí POI vào danh sách render Heat Map
                    // Mặc định scale là 1
                    heatPoints.push([poi.Lat, poi.Lng, 1.0]); 
                }
            });

            // Tiến hành dán Heat layer vào bản đồ
            if (heatPoints.length > 0) {
                heatLayer = L.heatLayer(heatPoints, {
                    radius: 35, // Độ rộng khu vực toả nhiêt
                    blur: 20, // Độ làm mờ biên
                    maxZoom: 16,
                    max: 1.0, 
                    gradient: {
                        0.4: 'yellow',
                        0.65: 'orange',
                        1.0: 'red'
                    }
                }).addTo(map);
            }

            // Autofit vùng nhìn camera
            if(bounds.length > 0) {
                map.fitBounds(bounds, { padding: [30, 30] });
            }
        }

        function updateUserLocation(lat, lng) {
            if(userMarker) {
                map.removeLayer(userMarker);
            }
            userMarker = L.marker([lat, lng], {icon: userIcon, zIndexOffset: 1000})
                .addTo(map)
                .bindPopup('<b style="font-family:sans-serif;">Vị trí của bạn</b>');
        }
    </script>
</body>
</html>
